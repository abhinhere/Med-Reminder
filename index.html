<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MedRemind – Medicine Reminder</title>
<meta name="description" content="MedRemind — your elegant daily medicine tracker with real-time reminders and browser notifications." />
<meta name="theme-color" content="#007AFF" />
<link rel="apple-touch-icon" href="icon-512.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="style.css" rel="stylesheet">
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="header" id="appHeader">
    <div class="header-left">
      <div class="logo-wrapper">
        <div class="logo" aria-label="MedRemind Logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M2 12h20"/>
            <rect x="4" y="4" width="16" height="16" rx="4"/>
          </svg>
        </div>
      </div>
      <div>
        <h1 class="app-title">MedRemind</h1>
        <p class="app-subtitle">Your daily medicine tracker</p>
      </div>
    </div>
    <div id="clock" class="clock-box" aria-live="polite">00:00:00</div>
  </header>

  <!-- Notification permission banner -->
  <div id="notifBanner" class="notif-banner" style="display:none" role="alert">
    <div class="notif-content">
      <div class="notif-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <span>Enable notifications for real-time alerts</span>
    </div>
    <button id="enableNotifBtn" class="btn-primary-small" onclick="requestPermission()">Enable</button>
  </div>

  <!-- Section header -->
  <div class="section-header">
    <div class="section-label-group">
      <h2 class="section-label">Medications</h2>
      <span class="section-count" id="medCount">0 items</span>
    </div>
    <button class="btn-add-open" id="toggleBtn" onclick="toggleForm()">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
  </div>

  <!-- Add form (hidden initially) -->
  <div id="formWrapper" class="form-wrapper" style="display:none">
    <div class="add-form">
      <div class="form-grid">
        <div class="form-group form-full">
          <label for="medName">Name</label>
          <input id="medName" type="text" placeholder="e.g. Amoxicillin" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="medTime">Time</label>
          <input id="medTime" type="time" />
        </div>
        <div class="form-group">
          <label for="medType">Type</label>
          <div class="select-wrapper">
            <select id="medType">
              <option value="pill">Pill / Capsule</option>
              <option value="tablet">Tablet</option>
              <option value="liquid">Liquid / Syrup</option>
            </select>
            <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="medDosage">Dosage</label>
          <input id="medDosage" type="text" placeholder="e.g. 1 tablet" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="medNotes">Notes</label>
          <input id="medNotes" type="text" placeholder="e.g. After meals" autocomplete="off" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" id="cancelBtn" onclick="toggleForm()">Cancel</button>
        <button class="btn-primary" id="submitBtn" onclick="addMedicine()">Add</button>
      </div>
    </div>
  </div>

  <!-- Medicine list -->
  <div id="medList" class="med-list"></div>

  <!-- Notification log -->
  <section class="log-panel" id="logPanel">
    <div class="log-header">
      <h2 class="section-label">Log</h2>
      <span id="logStatus" class="log-status on">
        <span class="pulse-dot"></span>
        Active
      </span>
    </div>
    <div id="logEntries" class="log-entries">
      <div class="log-entry">
        <span class="log-dot dot-info"></span>
        <span class="log-ts">--:--</span>
        <span>App started. Add medicines to begin tracking.</span>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="app-footer">
    <p>Created by <a href="https://github.com/abhinhere" target="_blank" rel="noopener noreferrer">@abhinhere</a></p>
  </footer>
</div>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
