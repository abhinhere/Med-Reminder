<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedRemind – Medicine Reminder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link href="style.css" rel="stylesheet">
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14c-.55 0-1-.45-1-1v-3H8c-.55 0-1-.45-1-1s.45-1 1-1h3V8c0-.55.45-1 1-1s1 .45 1 1v3h3c.55 0 1 .45 1 1s-.45 1-1 1h-3v3c0 .55-.45 1-1 1z"/></svg>
      </div>
      <div>
        <div class="app-title">MedRemind</div>
        <div class="app-subtitle">Your daily medicine tracker</div>
      </div>
    </div>
    <div id="clock" class="clock-box">00:00:00</div>
  </div>

  <!-- Notification permission banner -->
  <div id="notifBanner" class="notif-banner" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    <span>Enable browser notifications for real-time medicine alerts</span>
    <button onclick="requestPermission()">Enable</button>
  </div>

  <!-- Section header -->
  <div class="section-header">
    <span class="section-label">My Medications</span>
    <button class="btn-add-open" id="toggleBtn" onclick="toggleForm()">+ Add Medicine</button>
  </div>

  <!-- Add form (hidden initially) -->
  <div id="formWrapper" style="display:none">
    <div class="add-form">
      <div class="form-grid">
        <div class="form-group form-full">
          <label for="medName">Medicine Name</label>
          <input id="medName" type="text" placeholder="e.g. Amoxicillin 500mg" />
        </div>
        <div class="form-group">
          <label for="medTime">Reminder Time</label>
          <input id="medTime" type="time" />
        </div>
        <div class="form-group">
          <label for="medType">Type</label>
          <select id="medType">
            <option value="pill">💊 Pill / Capsule</option>
            <option value="tablet">💠 Tablet</option>
            <option value="liquid">🧪 Liquid / Syrup</option>
          </select>
        </div>
        <div class="form-group">
          <label for="medDosage">Dosage</label>
          <input id="medDosage" type="text" placeholder="e.g. 1 tablet" />
        </div>
        <div class="form-group">
          <label for="medNotes">Notes (optional)</label>
          <input id="medNotes" type="text" placeholder="e.g. After meals with water" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
        <button class="btn-submit" onclick="addMedicine()">Add Reminder</button>
      </div>
    </div>
  </div>

  <!-- Medicine list -->
  <div id="medList" class="med-list"></div>

  <!-- Notification log -->
  <div class="log-panel">
    <div class="log-header">
      <span class="section-label">Notification Log</span>
      <span id="logStatus" class="log-status on">Monitoring active</span>
    </div>
    <div id="logEntries" class="log-entries">
      <div class="log-entry">
        <span class="log-dot dot-info"></span>
        <span class="log-ts">--:--</span>
        <span style="color:var(--text3)">App started. Add medicines to begin tracking.</span>
      </div>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
